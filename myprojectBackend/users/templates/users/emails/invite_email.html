<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
</head>

<body style="
      margin: 0;
      padding: 0;
      background: #f4f6f8;
      font-family: Arial, sans-serif;
    ">
    <table width="100%" cellpadding="0" cellspacing="0" style="background: #f4f6f8; padding: 20px 0">
        <tr>
            <td align="center">
                <!-- Container -->
                <table width="500" cellpadding="0" cellspacing="0" style="
              background: #ffffff;
              border-radius: 10px;
              overflow: hidden;
              box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            ">
                    <!-- Header -->
                    <tr>
                        <td style="
                  background: #4caf50;
                  padding: 20px;
                  text-align: center;
                  color: white;
                  font-size: 20px;
                  font-weight: bold;
                ">
                            {{ hotel_name }}
                        </td>
                    </tr>

                    <!-- Body -->
                    <tr>
                        <td style="padding: 30px; text-align: center; color: #333">
                            <h2 style="margin-bottom: 10px">You're invited 🎉</h2>

                            <p style="font-size: 16px; color: #555">
                                You’ve been invited to join {{  resend_msg }} <strong>{{ hotel_name }}</strong>.
                            </p>

                            <!-- Button -->
                            <a href="{{ invite_link }}" style="
                    display: inline-block;
                    margin-top: 20px;
                    padding: 14px 24px;
                    background: #4caf50;
                    color: #ffffff;
                    text-decoration: none;
                    border-radius: 6px;
                    font-size: 16px;
                    font-weight: bold;
                  ">
                                Join Now
                            </a>

                            <p style="margin-top: 20px; font-size: 14px; color: #888">
                                This link will expire in 2 days.
                            </p>

                            <hr style="
                    margin: 30px 0;
                    border: none;
                    border-top: 1px solid #eee;
                  " />

                            <p style="font-size: 12px; color: #aaa">
                                If the button doesn't work, copy and paste this link:
                            </p>

                            <p style="font-size: 12px; color: #4caf50; word-break: break-all">
                                {{ invite_link }}
                            </p>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="
                  background: #f9f9f9;
                  padding: 15px;
                  text-align: center;
                  font-size: 12px;
                  color: #999;
                ">
                            © {{ hotel_name }} • All rights reserved
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>

</html>
